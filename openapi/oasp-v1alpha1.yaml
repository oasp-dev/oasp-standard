            input:
              type: object
              propertyNames:
                type: string
              additionalProperties: {}
              description: The input arguments passed to the builtin tool.
          required:
            - resourceType
            - id
            - at
            - type
            - toolUseId
            - name
            - input
          additionalProperties: false
          description: An invocation of a provider-hosted builtin tool.
        - type: object
          properties:
            resourceType:
              type: string
              const: Event
              description: FHIR-style discriminator naming this resource type; MUST equal the
                resource type name.
            id:
              type: string
              minLength: 1
              description: Opaque, order-comparable identifier for this event within its
                session stream. Used as the listSessionEvents pagination cursor
                and to establish the event ordering conformant adapters must
                preserve.
            at:
              type: string
              format: date-time
              pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
              description: Timestamp the event was emitted, as an ISO 8601 date-time. A UTC
                `Z` designator or a numeric zone offset (e.g. `+12:00`) is
                accepted, so implementations in any timezone can emit
                locally-offset timestamps.
            type:
              type: string
              const: status
              description: "Discriminant: a session status transition."
            status:
              type: string
              enum:
                - running
                - idle
                - error
              description: The session's new status.
          required:
            - resourceType
            - id
            - at
            - type
            - status
          additionalProperties: false
          description: A transition in the session's status.
        - type: object
          properties:
            resourceType:
              type: string
              const: Event
              description: FHIR-style discriminator naming this resource type; MUST equal the
                resource type name.
            id:
              type: string
              minLength: 1
              description: Opaque, order-comparable identifier for this event within its
                session stream. Used as the listSessionEvents pagination cursor
                and to establish the event ordering conformant adapters must
                preserve.
            at:
              type: string
              format: date-time
              pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
              description: Timestamp the event was emitted, as an ISO 8601 date-time. A UTC
                `Z` designator or a numeric zone offset (e.g. `+12:00`) is
                accepted, so implementations in any timezone can emit
                locally-offset timestamps.
            type:
              type: string
              const: error
              description: "Discriminant: an error condition."
            message:
              type: string
              minLength: 1
              description: Human-readable description of the error.
            recoverable:
              type: boolean
              description: Whether the session can continue after this error (e.g. via drain)
                or is terminally failed.
          required:
            - resourceType
            - id
            - at
            - type
            - message
            - recoverable
          additionalProperties: false
          description: An error condition encountered while executing the session.
      description: A normalised session-stream event, discriminated by `type`.
    Principal:
      type: object
      properties:
        resourceType:
          type: string
          const: Principal
          description: FHIR-style discriminator naming this resource type; MUST equal the
            resource type name.
        id:
          type: string
          minLength: 1
          description: Unique identifier of this Principal.
        kind:
          description: "The kind of acting party: a human user, a service, or an agent."
          $ref: "#/components/schemas/PrincipalKind"
        identity:
          type: object
          properties:
            subject:
              type: string
              minLength: 1
              description: Stable subject identifier for this principal, mappable to an OIDC
                `sub` claim.
            issuer:
              description: Identifier of the asserting identity provider, mappable to an OIDC
                `iss` claim.
              type: string
              minLength: 1
            displayName:
              description: Human-readable display name, if asserted by the identity provider.
              type: string
              minLength: 1
            email:
              description: Email address, if asserted by the identity provider.
              type: string
              format: email
              pattern: ^(?!\.)(?!.*\.\.)([A-Za-z0-9_'+\-\.]*)[A-Za-z0-9_+-]@([A-Za-z0-9][A-Za-z0-9\-]*\.)+[A-Za-z]{2,}$
          required:
            - subject
          additionalProperties: false
          description: The IdP-agnostic, OIDC-mappable claims-contract identity assertion.
        scopeMemberships:
          type: array
          items:
            $ref: "#/components/schemas/Scope"
          description: The scopes this principal is a member of, used to resolve
            most-specific-scope-wins.
        roles:
          type: array
          items:
            type: string
            minLength: 1
          description: IdP-agnostic role names asserted for this principal, independent of
            scope membership.
      required:
        - resourceType
        - id
        - kind
        - identity
        - scopeMemberships
        - roles
      additionalProperties: false
      description: "A first-class identity: the acting party behind every agent action."
    Credential:
      type: object
      properties:
        resourceType:
          type: string
          const: Credential
          description: FHIR-style discriminator naming this resource type; MUST equal the
            resource type name.
        id:
          type: string
          minLength: 1
          description: Unique identifier of this Credential.
        provider:
          description: The provider whose vault holds the referenced secret.
          $ref: "#/components/schemas/Provider"
        vaultId:
          type: string
          minLength: 1
          description: Reference into the provider's own secret vault. The secret itself
            is never stored here.
        mcpServerUrl:
          type: string
          format: uri
          description: URL of the MCP server this Credential is matched to at session
            creation.
        scope:
          description: The generalized-ownership attachment point this Credential is
            pinned to.
          $ref: "#/components/schemas/Scope"
        onBehalfOf:
          description: If present, restricts this Credential to use on behalf of this
            specific Principal.
          $ref: "#/components/schemas/PrincipalRef"
      required:
        - resourceType
        - id
        - provider
        - vaultId
        - mcpServerUrl
        - scope
      additionalProperties: false
      description: A provider-side vault reference, scope-pinned and matched to MCP
        servers by URL.
    AuditEvent:
      type: object
      properties:
        resourceType:
          type: string
          const: AuditEvent
          description: FHIR-style discriminator naming this resource type; MUST equal the
            resource type name.
        id:
          type: string
          minLength: 1
          description: Unique identifier of this AuditEvent.
        who:
          type: object
          properties:
            principal:
              description: The Principal that performed the interaction.
              $ref: "#/components/schemas/PrincipalRef"
            onBehalfOf:
              description: If the principal acted on behalf of another party (e.g. an
                assistant acting as a member), that party.
              $ref: "#/components/schemas/PrincipalRef"
          required:
            - principal
          additionalProperties: false
          description: The acting principal, and the party it acted on behalf of, if any.
        what:
          type: string
          enum:
            - publish
            - createConversation
            - migrate
            - drain
            - stream
            - send
            - sendToolResult
          description: Which v0 interaction this AuditEvent records.
        scope:
          description: The generalized-ownership attachment point the interaction occurred
            within. Required whenever `outcome` is `success` or `failure` (see
            the cross-field check this schema enforces below); MAY be omitted
            when `outcome` is `not_found`, since no primary resource was ever
            identified to source a scope from. The one exception is
            `createConversation`, whose `scope` comes from the caller-supplied
            input rather than an existing resource, so it remains populatable
            even on a `not_found` outcome — see docs/spec/audit.md § Not-found
            preconditions.
          $ref: "#/components/schemas/Scope"
        when:
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z|([+-](?:[01]\d|2[0-3]):[0-5]\d)))$
          description: Timestamp the interaction occurred, as an ISO 8601 date-time. A UTC
            `Z` designator or a numeric zone offset (e.g. `+12:00`) is accepted,
            so audit records from any timezone verify against the published
            schema.
        outcome:
          type: string
          enum:
            - success
            - failure
            - not_found
          description: "Whether the interaction succeeded, failed, or targeted a resource
            that never existed. `not_found` is its own value — distinct from
            `failure` — precisely so a probe against a nonexistent id is
            distinguishable in the trail from an ordinary operational failure
            (issue #11): a server MUST NOT return before emitting an AuditEvent
            merely because its precondition check found nothing to act on. See
            docs/spec/audit.md § Not-found preconditions."
        degraded:
          description: "Whether this interaction completed in a degraded mode that lost
            continuity it would otherwise have carried — e.g. a `migrate` whose
            Stage 2 transcript fetch failed and which proceeded with an empty
            seed instead (docs/spec/interactions.md § Degrade-to-fresh-start on
            transcript-fetch failure). Optional and additive: omitted (never
            `false`) for interactions with no degraded mode, and for a migrate
            that completed a full transcript seed. Present and `true` only on a
            degraded migrate. Without this field, a degraded migrate and a
            normal one both emit `outcome: 'success'` and are indistinguishable
            in the audit trail — the defect this field exists to close (issue
            #12)."
          type: boolean
        refs:
          type: object
          properties:
            sessionId:
              description: Identifier of the Session involved, if any (or asserted by the
                caller, on a not_found outcome).
              type: string
              minLength: 1
            conversationId:
              description: Identifier of the Conversation involved, if any (or asserted by the
                caller, on a not_found outcome).
              type: string
              minLength: 1
            definitionId:
              description: Identifier of the AgentDefinition involved, if any (or asserted by
                the caller, on a not_found outcome).
              type: string
              minLength: 1
            credentialIds:
              description: Identifiers of the Credentials attached/used in this interaction,
                so the trail names which credential — not just that one was
                attached.
              type: array
              items:
                type: string
                minLength: 1
          additionalProperties: false
          description: References to the session, conversation, definition, and/or
            credentials involved.
        evidence:
          description: "Action-specific evidence for this interaction — currently the
            `send` content digest and the pinned AgentDefinition version, when
            resolvable (issue #11, Tranche A). Omitted entirely (never `{}`)
            when neither sub-field applies, per the same absence-is-the-sentinel
            convention `degraded` uses."
          type: object
          properties:
            contentDigest:
              description: 'A canonical digest of the message content posted by `send`,
                formatted `sha256:<hex>`. Populated on every `send` AuditEvent
                regardless of outcome — the caller-supplied content is known
                whether or not the send itself succeeded — and omitted for every
                other `what` value. Answers "exactly what content was sent" from
                the trail alone, without re-deriving it from provider-side
                transcript storage. Distinct from the AgentDefinition
                version-content hash `docs/spec/audit.md` also discusses: that
                hash is deferred to issue #18 (no hash algorithm for it is
                chosen here) — this digests the *message content*, never the
                *AgentDefinition version*.'
              type: string
              minLength: 1
            agentVersionRef:
              description: "The AgentDefinition version pinned — or, for `migrate`, being
                attempted — at the time of this interaction: a migrate that
                resolves a target version records that TARGET even when a later
                stage fails and the Conversation keeps its old pin (the no-op
                branches record the unchanged pin); every other interaction
                records the resolved Session/Conversation's pinned version.
                Always the plain `{ agentDefinitionId, version }` pointer, never
                a content hash of that version (the cryptographic version hash
                issue #11 also asked for is deferred to issue #18; this reuses
                the same plain-integer `version` pin `AgentVersionRef` already
                carries elsewhere, per std-10). Populated whenever the
                interaction resolves a Session or Conversation, so a pin is
                knowable; omitted on a `not_found` outcome (no resource was ever
                resolved to source a pin from) and on `publish`, which advances
                an AgentDefinition's own version pointer directly rather than
                acting against an already-pinned Session/Conversation."
              $ref: "#/components/schemas/AgentVersionRef"
          additionalProperties: false
      required:
        - resourceType
        - id
        - who
        - what
        - when
        - outcome
        - refs
      additionalProperties: false
      description: The normative audit record emitted for every mutating interaction.
      if:
        properties:
          outcome:
            const: not_found
        required:
          - outcome
      else:
        required:
          - scope
paths:
  /agent-definitions/{id}/publish:
    post:
      operationId: publishAgentDefinition
      summary: "publish — snap published_version forward to the current draft head.
        Placeholder; full contract is Issue #2 (S1)."
      parameters:
        - name: id
          in: path
          required: true
          description: Identifier of the AgentDefinition to publish.
          schema:
            type: string
      responses:
        "200":
          description: The AgentDefinition with published_version advanced.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDefinition"
  /conversations:
    post:
      operationId: createConversation
      summary: "createConversation — mint the first Session for a new Conversation:
        mount resources, resolve+attach vaultIds, pin to publishedVersion.
        Placeholder; full contract is docs/spec/interactions.md §
        createConversation (Issue #5 / S4)."
      responses:
        "201":
          description: The newly created Conversation, riding on its freshly minted
            initial Session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
  /conversations/{id}/migrate:
    post:
      operationId: migrateConversation
      summary: "migrate — session upgrade: mint a session at a target agent version
        and swap it in. Placeholder; full contract is Issue #2 (S1)."
      parameters:
        - name: id
          in: path
          required: true
          description: Identifier of the Conversation to migrate.
          schema:
            type: string
      responses:
        "200":
          description: The Conversation, now riding on the newly minted session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
  /sessions/{id}/drain:
    post:
      operationId: drainSession
      summary: "drain — recover a session parked on pending tool calls. Placeholder;
        full contract is Issue #2 (S1)."
      parameters:
        - name: id
          in: path
          required: true
          description: Identifier of the Session to drain.
          schema:
            type: string
      responses:
        "200":
          description: The Session, returned to idle.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
  /sessions/{id}/events:
    get:
      operationId: streamSessionEvents
      summary: "stream — SSE of normalised events until idle/unrecoverable.
        Placeholder; full contract is Issue #2 (S1)."
      parameters:
        - name: id
          in: path
          required: true
          description: Identifier of the Session to stream events from.
          schema:
            type: string
      responses:
        "200":
          description: A stream of normalised session events.
          content:
            text/event-stream:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
  /sessions/{id}/messages:
    post:
      operationId: sendMessage
      summary: "send — post a message to the session. Placeholder; full contract is
        Issue #2 (S1)."
      parameters:
        - name: id
          in: path
          required: true
          description: Identifier of the Session to send the message to.
          schema:
            type: string
      responses:
        "202":
          description: The message was accepted for processing.
  /sessions/{id}/tool-results:
    post:
      operationId: sendToolResult
      summary: "sendToolResult — post a custom tool result to the session.
        Placeholder; full contract is Issue #2 (S1)."
      parameters:
        - name: id
          in: path
          required: true
          description: Identifier of the Session to post the tool result to.
          schema:
            type: string
      responses:
        "202":
          description: The tool result was accepted for processing.
