name: Publish schemas to GitHub Pages

# Publishes the generated `schemas/` directory (JSON Schema files +
# CNAME) to GitHub Pages, so resource schemas resolve at their `$id`
# URLs under https://schema.oasp.dev/v1alpha1/.
#
# This workflow is ready to run but live resolution at schema.oasp.dev
# additionally requires the DNS CNAME record pointing at GitHub Pages
# and the repo's Pages settings to be configured for a custom domain —
# both Brett-gated, not something this workflow can do on its own. See
# the root README's "Schema resolution" section.

on:
  push:
    branches: [main]
    paths:
      - "schemas/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload schemas/ as the Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: schemas

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
